<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Sales</title>
</head>
<body>
<div class="menu fr">
    <div >
        <a href="inventory.html">
            Inventory
        </a>
    </div>
    <div >
        <a href="sales.html">
            Sales
        </a>
    </div>
</div>
<div class="layout fr">
     <div class="side">
        <form id="s-form">
            <fieldset form="s-form" class="fc">
                <div>Name</div>
                <div class="field-wrapper fr">
                    <label class="field-label">
                        <input id="name" class="field field__input" placeholder="Name or sku">
                    </label>
                </div>
                
                <div>Supplier</div>
                <div class="field-wrapper fr">
                    <label class="field-label">
                        <input id="supplier" class="field field__input" placeholder="Supplier">
                    </label>
                </div>
                
                <div>Price</div>
                <div class="field-wrapper fr">
                    <label class="field-label">
                        <input id="price-min" class="field field__input" inputmode="decimal" min="0" type="number" placeholder="Min">
                    </label>
                    <label class="field-label">
                        <input id="price-max" class="field field__input" inputmode="decimal" min="0" type="number" placeholder="Max">
                    </label>
                </div>

                <div>Categories</div>
                <div class="field-wrapper fr">
                    <label class="field-label">
                        <input id="cat2" class="field field__input" placeholder="Category 2">
                    </label>
                    <label class="field-label">
                        <input id="cat3" class="field field__input" placeholder="Category 3">
                    </label>
                </div>

                <div>Count</div>
                <div class="field-wrapper fr">
                    <label class="field-label">
                        <input id="count-min" class="field field__input" type="number" placeholder="Min">
                    </label>
                    <label class="field-label">
                        <input id="count-max" class="field field__input" type="number" placeholder="Max">
                    </label>
                </div>

                <div>Channel Status</div>
                <div class="field-wrapper fr">
                    <label class="field-label">
                    <select id="status" class="field field__select">
                        <option value="-1">All statuses</option>
                        <option value="1">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                    </label>
                </div>
                
            </fieldset>
            <div>
                <button type="submit">Search</button>
            </div>
        </form>
   </div>
    <div class="main">
        <div id="graph-container"></div>
        <table>
        <thead>
        <tr id="product-thr">
            <th>Seller</th>
            <th>Category 2</th>
            <th>Category 3</th>
            <th>Sku</th>
            <th>Name</th>
            <th>Price</th>
            <th>Count</th>
        </tr>
        </thead>
        <tbody id="product-tb">
        </tbody>
    </table>
    </div>

</div>


<script type="module" src="../src/sales-script.js"></script>
</body>
</html>
